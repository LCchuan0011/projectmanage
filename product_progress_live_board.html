<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>产品进度管理与追踪看板 - 实时保存版</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root{
    --bg:#f5f5f7; --panel:rgba(255,255,255,.76); --panel-solid:#ffffff;
    --line:#e5e5ea; --line2:#f0f0f2; --hairline:rgba(0,0,0,.08);
    --text:#1d1d1f; --muted:#86868b; --muted2:#b7b7bd;
    --accent:#0071e3; --accent-strong:#005bb5;
    --green:#34c759; --amber:#ff9500; --purple:#af52de; --gray:#a1a1a6; --red:#ff3b30;
    --shadow:0 20px 60px rgba(0,0,0,.08);
    --shadow-soft:0 10px 30px rgba(0,0,0,.07);
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:
    radial-gradient(circle at 16% -10%, rgba(255,255,255,1) 0, rgba(255,255,255,0) 32%),
    radial-gradient(circle at 92% 0%, rgba(0,113,227,.08) 0, rgba(0,113,227,0) 28%),
    linear-gradient(180deg,#ffffff 0%,var(--bg) 44%,#ececf0 100%);
    color:var(--text);
    font-family:ui-sans-serif,-apple-system,"SF Pro Text","PingFang SC","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:13px;-webkit-font-smoothing:antialiased}
  ::-webkit-scrollbar{height:10px;width:10px}
  ::-webkit-scrollbar-thumb{background:#d1d1d6;border-radius:8px;border:2px solid var(--bg)}
  ::-webkit-scrollbar-thumb:hover{background:#b8b8bd}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:10px;
    border:1px solid var(--hairline);background:rgba(255,255,255,.72);cursor:pointer;font-size:12.5px;color:var(--text);
    transition:background .16s,border-color .16s,box-shadow .16s,transform .16s;white-space:nowrap;font-weight:500;
    box-shadow:0 1px 0 rgba(255,255,255,.75) inset}
  .btn:hover{background:rgba(255,255,255,.96);border-color:rgba(0,113,227,.18);box-shadow:var(--shadow-soft);transform:translateY(-1px)}
  .btn-primary{background:linear-gradient(180deg,#0a84ff,#0071e3);color:#fff;border-color:rgba(0,113,227,.35);box-shadow:0 12px 28px rgba(0,113,227,.24)}
  .btn-primary:hover{background:linear-gradient(180deg,#007aff,#006edb);border-color:rgba(0,113,227,.4)}
  .seg{display:inline-flex;border:1px solid var(--hairline);border-radius:11px;overflow:hidden;background:rgba(255,255,255,.64);box-shadow:0 1px 0 rgba(255,255,255,.72) inset}
  .seg button{padding:7px 13px;border:0;background:transparent;cursor:pointer;font-size:12.5px;color:var(--muted);font-weight:500}
  .seg button.active{background:#2f332f;color:#fff}
  .icon{width:15px;height:15px;stroke-width:2}

  /* ===== Gantt ===== */
  #ganttWrap{border:1px solid var(--hairline);border-radius:18px;background:var(--panel);overflow:hidden;box-shadow:var(--shadow);backdrop-filter:blur(18px)}
  .gantt-scroll{overflow:auto;max-height:62vh}
  .gantt-resizer{height:14px;display:flex;align-items:center;justify-content:center;cursor:ns-resize;border-top:1px solid var(--line2);background:rgba(255,255,255,.55)}
  .gantt-resizer::before{content:"";width:52px;height:4px;border-radius:999px;background:rgba(0,0,0,.16)}
  .gantt-resizer:hover::before{background:rgba(0,113,227,.36)}
  .gantt-grid{position:relative;display:grid}
  .yhead{position:sticky;left:0;z-index:30;background:var(--panel);
    border-right:1px solid var(--line);display:flex;align-items:center;
    padding:0 10px;font-weight:600;color:var(--muted);font-size:11px;letter-spacing:.04em;text-transform:uppercase}
  button.yhead{width:100%;height:100%;cursor:pointer;text-align:left}
  button.yhead:hover{color:var(--accent);background:rgba(0,113,227,.06)}
  .timehead{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.86);border-bottom:1px solid var(--line)}
  .corner{position:sticky;left:0;top:0;z-index:40;background:var(--panel);
    border-right:1px solid var(--line);border-bottom:1px solid var(--line)}
  .tcol{position:absolute;top:0;height:100%;border-right:1px solid var(--line2);text-align:center;
    font-size:11px;color:var(--muted);padding-top:7px;user-select:none}
  .tcol-resizer{position:absolute;right:-4px;top:0;width:8px;height:100%;cursor:col-resize;z-index:4}
  .tcol-resizer::after{content:"";position:absolute;right:3px;top:9px;width:2px;height:22px;border-radius:2px;background:rgba(0,0,0,.12);opacity:0;transition:opacity .16s}
  .tcol:hover .tcol-resizer::after{opacity:1}
  .tcol.weekend{background:rgba(245,245,247,.68)}
  .tcol .sub{font-size:10px;color:var(--muted2);margin-top:1px}
  .tcol.today{background:rgba(0,113,227,.07)}
  .ycell{position:sticky;left:0;z-index:15;background:var(--panel);border-right:1px solid var(--line);
    border-bottom:1px solid var(--line2);display:flex;align-items:center}
  .ycell.group-head{cursor:grab}
  .ycell.group-head:active{cursor:grabbing}
  .ycell.dragging{opacity:.52;box-shadow:0 0 0 2px rgba(0,113,227,.16) inset}
  .ycell.drag-over{background:rgba(0,113,227,.08)}
  .row-track{position:relative;border-bottom:1px solid var(--line2)}
  .row-track:hover{background:rgba(255,255,255,.56)}
  .tier1-cell{font-weight:700;color:var(--text);font-size:12.5px}
  .tier2-cell{color:#515154;font-weight:600;font-size:12px}
  .task-cell{color:var(--text)}
  .editable{cursor:text;border-radius:4px;padding:1px 4px;outline:none}
  .editable:hover{background:rgba(242,242,247,.95)}
  .editable[contenteditable="true"]{background:#fff;box-shadow:0 0 0 2px rgba(0,113,227,.25);cursor:text}
  .todayline{position:absolute;top:0;width:2px;background:var(--accent);z-index:8;pointer-events:none}
  .todayline::after{content:"今天";position:absolute;top:-1px;left:3px;font-size:9px;color:var(--accent);
    background:rgba(0,113,227,.1);padding:1px 5px;border-radius:0 0 5px 0;white-space:nowrap;font-weight:600}

  .bar{position:absolute;height:22px;border-radius:999px;display:flex;align-items:center;
    padding:0 8px;color:#fff;font-size:11px;font-weight:600;cursor:grab;overflow:visible;
    box-shadow:0 8px 18px rgba(0,0,0,.08);user-select:none;white-space:nowrap}
  .bar:active{cursor:grabbing}
  .bar .barfill{position:absolute;left:0;top:0;height:100%;border-radius:999px;opacity:.32;background:#000}
  .bar .barlabel{position:relative;z-index:2;text-shadow:0 1px 1px rgba(0,0,0,.25);overflow:hidden;text-overflow:ellipsis}
  .handle{position:absolute;top:0;width:8px;height:100%;cursor:ew-resize;z-index:3}
  .handle.l{left:-1px}.handle.r{right:-1px}
  .ring{position:absolute;z-index:6;pointer-events:none}
  .ring text{font-size:9px;font-weight:700;fill:var(--text)}
  .legend-dot{width:9px;height:9px;border-radius:50%;display:inline-block}

  /* ===== Table ===== */
  table{border-collapse:collapse;width:100%;font-size:12.5px}
  th{position:sticky;top:0;background:rgba(250,249,247,.96);z-index:5;text-align:left;padding:10px 12px;
    border-bottom:1px solid var(--line);color:var(--muted);font-weight:600;font-size:11px;
    text-transform:uppercase;letter-spacing:.03em;white-space:nowrap}
  td{padding:9px 12px;border-bottom:1px solid var(--line2);vertical-align:middle}
  tr:hover td{background:rgba(255,255,255,.62)}
  #tableBody tr{cursor:pointer}
  #tableBody tr.row-highlight td{background:rgba(0,113,227,.10)!important}
  #tableBody tr.editing{cursor:default}
  td .cell-edit{outline:none;border-radius:4px;padding:2px 5px;min-height:20px}
  td .cell-edit:hover{background:rgba(242,242,247,.95)}
  td .cell-edit:focus{background:#fff;box-shadow:0 0 0 2px rgba(0,113,227,.22)}
  .pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600}
  .progress-mini{height:5px;background:#e5e5ea;border-radius:4px;overflow:hidden;width:70px;display:inline-block;vertical-align:middle}
  .progress-mini>i{display:block;height:100%;border-radius:4px}
  .row-del{color:var(--red)!important;background:rgba(255,59,48,.08)!important;border-color:rgba(255,59,48,.12)!important;box-shadow:none!important}
  .row-del:hover{background:rgba(255,59,48,.12)!important;border-color:rgba(255,59,48,.18)!important}
  select.statussel{border:0;background:transparent;font:inherit;color:inherit;cursor:pointer;outline:none}
  input.dt{border:1px solid transparent;border-radius:4px;padding:2px 4px;font:inherit;color:inherit;background:transparent;width:108px}
  input.dt:hover{background:rgba(242,242,247,.95)}
  input.dt:focus{background:#fff;border-color:var(--accent);outline:none}
  .muted{color:var(--muted)}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:rgba(47,51,47,.92);color:#fff;
    padding:10px 17px;border-radius:999px;font-size:12.5px;opacity:0;transition:opacity .25s;z-index:100;pointer-events:none;box-shadow:0 18px 38px rgba(0,0,0,.18);backdrop-filter:blur(16px)}
  .toast.show{opacity:1}
  .hidden{display:none!important}.flex{display:flex}.grid{display:grid}.block{display:block}.inline-flex{display:inline-flex}
  .items-center{align-items:center}.justify-between{justify-content:space-between}.justify-center{justify-content:center}
  .flex-wrap{flex-wrap:wrap}.min-w-0{min-width:0}.mx-auto{margin-left:auto;margin-right:auto}.m-0{margin:0}
  .mt-1{margin-top:.25rem}.mt-2{margin-top:.5rem}.mt-5{margin-top:1.25rem}.mt-6{margin-top:1.5rem}.mb-1{margin-bottom:.25rem}.mb-3{margin-bottom:.75rem}.mb-4{margin-bottom:1rem}.ml-auto{margin-left:auto}
  .gap-1{gap:.25rem}.gap-1\.5{gap:.375rem}.gap-2{gap:.5rem}.gap-3{gap:.75rem}.gap-4{gap:1rem}
  .px-1{padding-left:.25rem;padding-right:.25rem}.px-2{padding-left:.5rem;padding-right:.5rem}.px-2\.5{padding-left:.625rem;padding-right:.625rem}.px-5{padding-left:1.25rem;padding-right:1.25rem}.py-5{padding-top:1.25rem;padding-bottom:1.25rem}
  .p-1\.5{padding:.375rem}.rounded{border-radius:.25rem}.rounded-xl{border-radius:.75rem}.border{border:1px solid var(--line)}.border-r{border-right:1px solid var(--line)}
  .overflow-auto{overflow:auto}.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.text-center{text-align:center}
  .font-bold{font-weight:700}.font-semibold{font-weight:600}.font-mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}
  .tracking-tight{letter-spacing:0}.w-full{width:100%}.max-w-\[1480px\]{max-width:1480px}
  .text-\[10px\]{font-size:10px}.text-\[11px\]{font-size:11px}.text-\[11\.5px\]{font-size:11.5px}.text-\[12px\]{font-size:12px}.text-\[15px\]{font-size:15px}.text-\[20px\]{font-size:20px}
  .grid-cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}
</style>
</head>
<body>
<div class="max-w-[1480px] mx-auto px-5 py-5">

  <!-- Header -->
  <header class="flex items-center justify-between gap-4 mb-4 flex-wrap">
    <div>
      <h1 class="text-[20px] font-bold tracking-tight m-0 flex items-center gap-2">
        <i data-lucide="git-branch-plus" class="icon" style="width:20px;height:20px;color:var(--accent)"></i>
        产品进度管理与追踪看板
      </h1>
      <p class="text-[12px] m-0 mt-1" style="color:var(--muted)">多部门协作 · 迭代里程碑 · 实时双向联动 · 本地自动保存</p>
    </div>
    <div class="flex items-center gap-2 flex-wrap">
      <div class="seg" id="granSeg">
        <button data-gran="day" class="active">按天</button>
        <button data-gran="week">按周</button>
      </div>
      <div class="flex items-center gap-1.5 text-[12px]" style="color:var(--muted)">
        <input type="date" id="rangeStart" class="btn !px-2 !py-1.5" style="color:var(--text)">
        <span>—</span>
        <input type="date" id="rangeEnd" class="btn !px-2 !py-1.5" style="color:var(--text)">
      </div>
      <div id="holidayHint" class="btn !cursor-default" style="color:var(--muted);background:rgba(255,255,255,.48)"></div>
      <button class="btn" id="fitBtn"><i data-lucide="maximize-2" class="icon"></i>自适应</button>
      <button class="btn" id="filterBtn"><i data-lucide="sliders-horizontal" class="icon"></i>筛选</button>
      <button class="btn" id="addBtn"><i data-lucide="plus" class="icon"></i>新增需求</button>
      <button class="btn" id="resetBtn"><i data-lucide="rotate-ccw" class="icon"></i>恢复模板</button>
      <button class="btn" id="exportBtn"><i data-lucide="download" class="icon"></i>导出配置</button>
      <button class="btn btn-primary" id="importBtn"><i data-lucide="upload" class="icon"></i>导入配置</button>
      <input type="file" id="importFile" accept="application/json,.json" class="hidden">
    </div>
  </header>

  <!-- Gantt -->
  <div id="ganttWrap">
    <div class="gantt-scroll" id="ganttScroll">
      <div class="gantt-grid" id="ganttGrid"></div>
    </div>
    <div class="gantt-resizer" id="ganttResizer" title="拖动调整甘特图高度"></div>
  </div>

  <!-- Master table -->
  <div class="mt-6 flex items-center justify-between">
    <h2 class="text-[15px] font-bold m-0 flex items-center gap-2">
      <i data-lucide="table-2" class="icon" style="color:var(--accent)"></i>全局数据主表（Master Table）
    </h2>
    <span class="text-[11.5px]" style="color:var(--muted)" id="taskCount"></span>
  </div>
  <div class="mt-2 border rounded-xl overflow-auto" style="border-color:var(--hairline);max-height:50vh;background:var(--panel);box-shadow:var(--shadow);backdrop-filter:blur(18px)">
    <table id="masterTable">
      <thead id="tableHead"></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <p class="text-center text-[11px] mt-5" style="color:var(--muted2)">
    数据通过浏览器 LocalStorage 自动保存 · 刷新或关闭后不丢失 · 换电脑或换浏览器请使用「导出/导入配置」
  </p>
</div>
<div class="toast" id="toast"></div>

<script>
/* ============ 数据模型 & 持久化 ============ */
const LS_KEY = "kanban_product_tracker_v2";
const DAY = 86400000;

// 默认种子数据（与参考截图一致）
const SEED = {
  meta:{ gran:"day", rangeStart:"2026-06-01", rangeEnd:"2026-06-16", collapsed:[], featureOrder:[], prioritySort:null, ganttHeight:420, filters:{priority:"全部",status:"全部",dept:"全部"} },
  tasks:[
    {id:"REQ-2026-001",priority:"P1",tier1:"客户端",tier2:"iOS",featureName:"发帖强插关注列表功能",purpose:"提升关注关系链转化，增加发帖后互动入口曝光",status:"已完成",progress:100,owner:"鲁明",start:"2026-06-08",end:"2026-06-14",notes:""},
    {id:"REQ-2026-002",priority:"P1",tier1:"客户端",tier2:"Android",featureName:"发帖强插关注列表功能",purpose:"Android 端对齐 iOS 的关注列表强插策略",status:"已完成",progress:100,owner:"周国荣",start:"2026-06-08",end:"2026-06-14",notes:""},
    {id:"REQ-2026-003",priority:"P1",tier1:"服务端",tier2:"全局",featureName:"发帖强插关注列表功能",purpose:"提供关注列表强插规则、排序与实验参数支持",status:"已完成",progress:100,owner:"待分配",start:"2026-06-08",end:"2026-06-14",notes:""},
    {id:"REQ-2026-004",priority:"P2",tier1:"客户端",tier2:"iOS",featureName:"帖子转发给AI虚拟人-逛逛",purpose:"提升内容分发效率，打通 AI 虚拟人互动链路",status:"已完成",progress:100,owner:"鲁明",start:"2026-06-08",end:"2026-06-14",notes:""},
    {id:"REQ-2026-005",priority:"P2",tier1:"客户端",tier2:"Android",featureName:"帖子转发给AI虚拟人-逛逛",purpose:"Android 端对齐帖子转发给 AI 虚拟人的完整体验",status:"已完成",progress:100,owner:"周国荣",start:"2026-06-08",end:"2026-06-14",notes:""},
    {id:"REQ-2026-006",priority:"P2",tier1:"服务端",tier2:"全局",featureName:"帖子转发给AI虚拟人-逛逛",purpose:"支撑转发、虚拟人分发、消息回流与状态同步",status:"已完成",progress:100,owner:"待分配",start:"2026-06-08",end:"2026-06-14",notes:""}
  ]
};

function load(){
  try{ const raw = localStorage.getItem(LS_KEY); if(raw) return normalizeState(JSON.parse(raw)); }catch(e){}
  return normalizeState(JSON.parse(JSON.stringify(SEED)));
}
function save(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(STATE)); }catch(e){ toast("保存失败：存储空间已满"); } }
function resetToSeed(){
  STATE = normalizeState(JSON.parse(JSON.stringify(SEED)));
  localStorage.setItem(LS_KEY, JSON.stringify(STATE));
  syncRangeInputs();
  renderAll();
}

/* ============ 日期工具 ============ */
function parseD(s){ const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d); }
function fmtD(dt){ return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0"); }
function diffDays(a,b){ return Math.round((parseD(b)-parseD(a))/DAY); }
function addDays(s,n){ const d=parseD(s); d.setDate(d.getDate()+n); return fmtD(d); }
function isWeekend(dt){ const w=dt.getDay(); return w===0||w===6; }
function todayStr(){ return fmtD(new Date()); }
const HOLIDAYS = [
  {date:"2026-01-01",name:"元旦",type:"法定节假日"},
  {date:"2026-02-17",name:"春节",type:"法定节假日"},
  {date:"2026-04-05",name:"清明节",type:"法定节假日"},
  {date:"2026-05-01",name:"劳动节",type:"法定节假日"},
  {date:"2026-05-10",name:"母亲节",type:"节日"},
  {date:"2026-06-19",name:"端午节",type:"法定节假日"},
  {date:"2026-06-21",name:"父亲节",type:"节日"},
  {date:"2026-09-25",name:"中秋节",type:"法定节假日"},
  {date:"2026-10-01",name:"国庆节",type:"法定节假日"},
  {date:"2026-12-25",name:"圣诞节",type:"节日"}
];
function clampDate(s){ // 限制在 range 内
  const a=STATE.meta.rangeStart, b=STATE.meta.rangeEnd;
  if(parseD(s)<parseD(a)) return a; if(parseD(s)>parseD(b)) return b; return s;
}

/* ============ 状态/颜色派生（只读自动联动）============ */
function deriveColor(t){
  const p = t.progress;
  if(p>=100) return getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
  if(p<=0)   return getComputedStyle(document.documentElement).getPropertyValue('--gray').trim();
  // 时间进度 vs 完成进度
  const total = Math.max(1, diffDays(t.start,t.end));
  const elapsed = Math.min(total, Math.max(0, diffDays(t.start, todayStr())));
  const expected = (elapsed/total)*100;
  if(p+8 < expected) return getComputedStyle(document.documentElement).getPropertyValue('--amber').trim();
  return getComputedStyle(document.documentElement).getPropertyValue('--green').trim();
}
function deriveStatusLabel(t){
  if(t.progress>=100) return "已完成";
  if(t.progress<=0)   return "未开始";
  const c = deriveColor(t);
  return c===statusColor("有风险") ? "延期风险" : "顺利推进";
}
const STATUS_OPTIONS = ["未开始","顺利推进","有风险","已完成"];
const STATUS_VAR = {"未开始":"--gray","顺利推进":"--green","有风险":"--amber","已完成":"--accent"};
const PRIORITY_OPTIONS = ["P0","P1","P2"];
const PRIORITY_VAR = {"P0":"--purple","P1":"--amber","P2":"--accent"};
const TIER2_MAP = {
  "客户端":["iOS","Android","H5"],
  "服务端":["全局"],
  "设计":["UI"],
  "AI团队":["模型","算法","提示词","全局"],
  "数据":["埋点","数仓","分析","全局"],
  "测试":["功能测试","回归测试","全局"],
  "运营部":["逛逛","密友聊天","全局"],
  "其他":[]
};
const TIER2_ORDER = ["全局","UI","iOS","Android","H5","模型","算法","提示词","埋点","数仓","分析","功能测试","回归测试","逛逛","密友聊天"]; // pill 统一排序
function statusColor(s){ return getComputedStyle(document.documentElement).getPropertyValue(STATUS_VAR[s]||"--gray").trim(); }
function priorityColor(p){ return getComputedStyle(document.documentElement).getPropertyValue(PRIORITY_VAR[p]||"--gray").trim(); }
const DEPT_COLORS = {
  "客户端":"#3b8eea",
  "服务端":"#48b86a",
  "设计":"#a66be2",
  "AI团队":"#7471e8",
  "数据":"#0f9f8f",
  "测试":"#d88a18",
  "运营部":"#24a8b5",
  "其他":"#6e6e73"
};
function deptColor(task){ return DEPT_COLORS[task.tier1] || "#d1d1d6"; }
const FEATURE_COLORS = ["#d7e6f3","#c9dff0","#b7d7e8","#dfe9d2","#cfe2c2","#f1e5c8","#efd4d6","#e8d7e6","#d9d5ed","#cfe8e8"];
function featureColor(featureName){
  let hash=0;
  String(featureName||"").split("").forEach(ch=>{ hash=(hash*31+ch.charCodeAt(0))>>>0; });
  return FEATURE_COLORS[hash % FEATURE_COLORS.length];
}
function draftFromGroup(featureName){
  const groupTasks=STATE.tasks.filter(t=>t.featureName===featureName);
  const source=groupTasks[0] || {};
  return {
    id:nextId(),
    priority:source.priority || "P1",
    tier1:"客户端",
    tier2:"iOS",
    featureName:featureName || "新需求",
    purpose:source.purpose || "",
    status:"未开始",
    progress:0,
    owner:"待分配",
    start:source.start || todayStr(),
    end:source.end || addDays(todayStr(),3),
    notes:""
  };
}
function normalizeTask(raw, index){
  const fallback = SEED.tasks[index] || SEED.tasks[0];
  const task = {...fallback, ...raw};
  task.id = String(task.id || `REQ-2026-${String(index+1).padStart(3,"0")}`);
  task.priority = PRIORITY_OPTIONS.includes(task.priority) ? task.priority : "P1";
  task.progress = Math.max(0, Math.min(100, parseInt(task.progress, 10) || 0));
  task.status = STATUS_OPTIONS.includes(task.status) ? task.status : deriveStatusLabel(task);
  task.start = /^\d{4}-\d{2}-\d{2}$/.test(task.start) ? task.start : fallback.start;
  task.end = /^\d{4}-\d{2}-\d{2}$/.test(task.end) ? task.end : fallback.end;
  if(task.tier1==="其他" && !String(task.tier2||"").trim()) task.tier2="外部协作";
  if(parseD(task.end)<parseD(task.start)) task.end = task.start;
  return task;
}
function normalizeState(state){
  state.meta=state.meta||{};
  state.meta.gran=state.meta.gran==="week"?"week":"day";
  state.meta.rangeStart=state.meta.rangeStart||SEED.meta.rangeStart;
  state.meta.rangeEnd=state.meta.rangeEnd||SEED.meta.rangeEnd;
  state.meta.collapsed=[];
  state.meta.featureOrder=Array.isArray(state.meta.featureOrder)?state.meta.featureOrder:[];
  state.meta.prioritySort=state.meta.prioritySort==="desc"?"desc":(state.meta.prioritySort==="asc"?"asc":null);
  state.meta.ganttHeight=Math.max(220,Math.min(900,parseInt(state.meta.ganttHeight,10)||420));
  state.meta.filters={
    priority:state.meta.filters?.priority||"全部",
    status:state.meta.filters?.status||"全部",
    dept:state.meta.filters?.dept||"全部"
  };
  state.tasks=Array.isArray(state.tasks)?state.tasks.map(normalizeTask):[];
  return state;
}
function passesFilters(task){
  const filters=STATE.meta.filters||{};
  if(filters.priority&&filters.priority!=="全部"&&task.priority!==filters.priority) return false;
  if(filters.status&&filters.status!=="全部"&&task.status!==filters.status) return false;
  if(filters.dept&&filters.dept!=="全部"&&task.tier1!==filters.dept) return false;
  return true;
}
let STATE = load();

/* ============ Y轴分组（以「需求名称」为第一列，合并同名 + 可折叠）============ */
const TIER_ORDER = ["设计","客户端","服务端","AI团队","数据","测试","运营部","其他"];
function deptLabel(t){ return t.tier2==="全局" ? t.tier1 : (t.tier1+" / "+t.tier2); }
function prioritySelect(featureName, priority){
  const color=priorityColor(priority);
  return `<span class="pill priority-pill" style="background:${color}1f;color:${color};font-weight:700">
    <select class="statussel gantt-priority-select" data-feat="${esc(featureName)}" style="color:${color};font-weight:700">
      ${PRIORITY_OPTIONS.map(o=>`<option ${o===priority?"selected":""}>${o}</option>`).join("")}
    </select>
  </span>`;
}
function deptSortKey(t){
  const a=TIER_ORDER.indexOf(t.tier1), b=TIER2_ORDER.indexOf(t.tier2);
  return (a<0?99:a)*100 + (b<0?99:b);
}
function isCollapsed(fn){ return (STATE.meta.collapsed||[]).includes(fn); }
function priorityRank(priority){ return PRIORITY_OPTIONS.indexOf(priority); }
function ensureFeatureOrder(featureNames){
  const known = new Set(featureNames);
  STATE.meta.featureOrder = (STATE.meta.featureOrder||[]).filter(fn=>known.has(fn));
  featureNames.forEach(fn=>{ if(!STATE.meta.featureOrder.includes(fn)) STATE.meta.featureOrder.push(fn); });
}
function moveFeatureBefore(sourceFeat,targetFeat){
  const allFeatures=[...new Set(STATE.tasks.map(t=>t.featureName))];
  ensureFeatureOrder(allFeatures);
  const order=STATE.meta.featureOrder.filter(fn=>fn!==sourceFeat);
  const targetIndex=order.indexOf(targetFeat);
  order.splice(targetIndex<0?order.length:targetIndex,0,sourceFeat);
  STATE.meta.featureOrder=order;
}
function buildGroups(){
  const order=[], groups={};
  STATE.tasks.filter(passesFilters).forEach(t=>{
    if(!groups[t.featureName]){ groups[t.featureName]=[]; order.push(t.featureName); }
    groups[t.featureName].push(t);
  });
  ensureFeatureOrder([...new Set(STATE.tasks.map(t=>t.featureName))]);
  const manualIndex = fn => STATE.meta.featureOrder.indexOf(fn);
  const sortedOrder = order.slice().sort((a,b)=>{
    if(STATE.meta.prioritySort){
      const pa=priorityRank(groups[a][0]?.priority), pb=priorityRank(groups[b][0]?.priority);
      const dir=STATE.meta.prioritySort==="asc" ? 1 : -1;
      if(pa!==pb) return (pa-pb)*dir;
    }
    return manualIndex(a)-manualIndex(b);
  });
  return sortedOrder.map(fn=>({
    featureName:fn,
    tasks:groups[fn].slice().sort((a,b)=>deptSortKey(a)-deptSortKey(b))
  }));
}

/* ============ Gantt 渲染 ============ */
let COL_W = 64;          // 每天像素宽（按周时为每周）
const Y_W = 360;         // Y轴两列总宽
const ROW_H = 40;
const HEAD_H = 40;
const PRI_W=74, INFO_W=Y_W-PRI_W;  // 优先级列 / 需求信息列

function renderGantt(){
  const gran = STATE.meta.gran;
  const rs = STATE.meta.rangeStart, re = STATE.meta.rangeEnd;
  const totalDays = Math.max(1, diffDays(rs,re)+1);
  const rows = buildGroups();
  const grid = document.getElementById("ganttGrid");

  // 列：按天 = 每天一列；按周 = 每7天一列
  const unit = gran==="week" ? 7 : 1;
  const cols = Math.ceil(totalDays/unit);
  const defaultColWidth = gran==="week" ? 96 : Math.max(40, Math.min(80, Math.floor((window.innerWidth-Y_W-120)/totalDays)));
  COL_W = STATE.meta.columnWidth || defaultColWidth;
  const trackW = cols*COL_W;

  grid.style.width = (Y_W+trackW)+"px";
  grid.style.gridTemplateColumns = `${Y_W}px ${trackW}px`;
  grid.innerHTML = "";

  // --- 角 + 时间头 ---
  const corner = document.createElement("div");
  corner.className="corner"; corner.style.height=HEAD_H+"px";
  corner.style.display="grid"; corner.style.gridTemplateColumns=`${PRI_W}px ${INFO_W}px`;
  const sortIcon = STATE.meta.prioritySort==="asc" ? " ↑" : (STATE.meta.prioritySort==="desc" ? " ↓" : "");
  corner.innerHTML=`<button class="yhead priority-sort-head" type="button" title="按 P0 / P1 / P2 排序">优先级${sortIcon}</button><div class="yhead">需求 / 部门</div>`;
  grid.appendChild(corner);

  const timehead=document.createElement("div");
  timehead.className="timehead"; timehead.style.position="relative"; timehead.style.height=HEAD_H+"px";
  for(let c=0;c<cols;c++){
    const dStr = addDays(rs, c*unit);
    const dt = parseD(dStr);
    const col=document.createElement("div");
    col.className="tcol"; col.style.left=(c*COL_W)+"px"; col.style.width=COL_W+"px";
    if(gran==="day" && isWeekend(dt)) col.classList.add("weekend");
    if(gran==="day" && dStr===todayStr()) col.classList.add("today");
    if(gran==="week"){
      col.innerHTML = `W${getWeek(dt)}<div class="sub">${(dt.getMonth()+1)}月${dt.getDate()}日起</div><span class="tcol-resizer" data-col="${c}"></span>`;
    }else{
      const wd=["日","一","二","三","四","五","六"][dt.getDay()];
      col.innerHTML = `${wd}<div class="sub">${(dt.getMonth()+1)}月${dt.getDate()}日</div><span class="tcol-resizer" data-col="${c}"></span>`;
    }
    timehead.appendChild(col);
  }
  grid.appendChild(timehead);

  // --- 行（按需求分组，组头可折叠/删除）---
  let rendered=0;
  const addTrack = (inner)=>{
    const track=document.createElement("div");
    track.className="row-track"; track.style.height=ROW_H+"px"; track.style.position="relative";
    for(let c=0;c<cols;c++){
      const dStr=addDays(rs,c*unit); const dt=parseD(dStr);
      const cell=document.createElement("div");
      cell.className="tcol"; cell.style.left=(c*COL_W)+"px"; cell.style.width=COL_W+"px"; cell.style.height="100%"; cell.style.paddingTop="0";
      if(gran==="day" && isWeekend(dt)) cell.classList.add("weekend");
      if(gran==="day" && dStr===todayStr()) cell.classList.add("today");
      track.appendChild(cell);
    }
    if(inner){
      if(inner.dataset.id) track.dataset.id=inner.dataset.id;
      track.appendChild(inner);
    }
    track.addEventListener("click",e=>{
      if(e.target.closest(".bar,.handle")) return;
      if(track.dataset.id) focusTableRow(track.dataset.id);
    });
    grid.appendChild(track); rendered++;
  };

  rows.forEach(g=>{
    const collapsed = isCollapsed(g.featureName);
    const multi = g.tasks.length>1;
    const head = g.tasks[0];
    // 组头行（需求名 + 折叠/删除）
    const yc=document.createElement("div");
    yc.className="ycell group-head"; yc.style.height=ROW_H+"px";
    yc.dataset.id=head.id;
    yc.dataset.feat=g.featureName;
    yc.draggable=true;
    yc.style.display="grid"; yc.style.gridTemplateColumns=`${PRI_W}px ${INFO_W}px`;
    const caret = multi
      ? `<span class="group-caret" data-feat="${esc(g.featureName)}" style="cursor:pointer;flex:none;display:inline-flex"><i data-lucide="${collapsed?'chevron-right':'chevron-down'}" style="width:14px;height:14px;color:var(--muted)"></i></span>`
      : `<span style="width:14px;flex:none"></span>`;
    const featBox = `<div class="flex items-center gap-1 min-w-0">${caret}
      <span class="group-add" data-feat="${esc(g.featureName)}" title="为该需求新增部门任务" style="cursor:pointer;flex:none;display:inline-flex;color:var(--accent)"><i data-lucide="plus" style="width:13px;height:13px"></i></span>
      <div class="task-cell editable text-[12px] font-semibold truncate" data-edit="featureName" data-id="${head.id}" title="${esc(g.featureName)}">${esc(g.featureName)}</div>
      ${multi?`<span class="text-[10px] px-1 rounded" style="background:rgba(242,242,247,.95);color:var(--muted);flex:none">${g.tasks.length}</span>`:""}
      <span class="group-del" data-feat="${esc(g.featureName)}" title="删除整个需求组" style="cursor:pointer;flex:none;display:inline-flex;margin-left:2px"><i data-lucide="trash-2" style="width:13px;height:13px;color:var(--muted2)"></i></span></div>`;
    yc.innerHTML = `<div class="flex items-center px-2.5 border-r" style="border-color:var(--line2)">${prioritySelect(g.featureName, head.priority)}</div>
      <div class="flex items-center px-2 min-w-0" style="gap:8px">${featBox}</div>`;
    yc.addEventListener("click",e=>{
      if(e.target.closest(".group-caret,.group-add,.group-del,.gantt-priority-select,[contenteditable]")) return;
      focusTableRow(head.id);
    });
    grid.appendChild(yc);
    addTrack();

    // 展开时所有部门都作为组头下的子行显示，组头不再混放部门
    if(!collapsed){
      g.tasks.forEach(task=>{
        const yc2=document.createElement("div");
        yc2.className="ycell"; yc2.style.height=ROW_H+"px";
        yc2.dataset.id=task.id;
        yc2.style.display="grid"; yc2.style.gridTemplateColumns=`${PRI_W}px ${INFO_W}px`;
        const c=deptColor(task);
        yc2.innerHTML=`<div class="border-r" style="border-color:var(--line2)"></div>
          <div class="flex items-center justify-between px-2" style="gap:10px">
            <span class="text-[11px]" style="color:var(--muted2)">└</span>
            <span class="pill" style="background:${c}1f;color:${c};margin-left:auto"><i class="legend-dot" style="background:${c}"></i>${esc(deptLabel(task))}</span>
          </div>`;
        yc2.addEventListener("click",()=>focusTableRow(task.id));
        grid.appendChild(yc2);
        addTrack(makeBar(task, rs, unit));
      });
    }
  });

  // 今日线（仅按天）
  if(gran==="day"){
    const off = diffDays(rs, todayStr());
    if(off>=0 && off<totalDays){
      const line=document.createElement("div");
      line.className="todayline";
      line.style.left=(Y_W + (off+0.5)*COL_W -1)+"px";
      line.style.height=(HEAD_H+rendered*ROW_H)+"px";
      grid.appendChild(line);
    }
  }
  enableColumnResize();
  const shown=STATE.tasks.filter(passesFilters).length;
  document.getElementById("taskCount").textContent = `显示 ${shown} / ${STATE.tasks.length} 条需求 · ${rows.length} 个需求组`;
}
function getWeek(dt){ const o=new Date(dt.getFullYear(),0,1); return Math.ceil(((dt-o)/DAY + o.getDay()+1)/7); }
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function focusTableRow(id){
  const row=Array.from(document.querySelectorAll("#tableBody tr")).find(el=>el.dataset.id===id);
  if(!row) return;
  document.querySelectorAll("#tableBody tr.row-highlight").forEach(el=>el.classList.remove("row-highlight"));
  row.classList.add("row-highlight");
  row.scrollIntoView({behavior:"smooth",block:"center",inline:"nearest"});
  clearTimeout(row._highlightTimer);
  row._highlightTimer=setTimeout(()=>row.classList.remove("row-highlight"),2400);
}
function enableColumnResize(){
  document.querySelectorAll(".tcol-resizer").forEach(handle=>{
    handle.addEventListener("mousedown",e=>{
      e.preventDefault();
      e.stopPropagation();
      const startX=e.clientX;
      const startWidth=COL_W;
      let resizeFrame=null;
      const onMove=evt=>{
        const nextWidth=Math.max(36,Math.min(150,startWidth+evt.clientX-startX));
        STATE.meta.columnWidth=Math.round(nextWidth);
        if(!resizeFrame){
          resizeFrame=requestAnimationFrame(()=>{
            resizeFrame=null;
            redrawGantt();
          });
        }
      };
      const onUp=()=>{
        document.removeEventListener("mousemove",onMove);
        document.removeEventListener("mouseup",onUp);
        if(resizeFrame) cancelAnimationFrame(resizeFrame);
        STATE.meta.columnWidth=Math.round(STATE.meta.columnWidth || COL_W);
        save();
        redrawGantt();
      };
      document.addEventListener("mousemove",onMove);
      document.addEventListener("mouseup",onUp);
    });
  });
}

/* ============ 甘特条（细条，无圆环）============ */
const BAR_H = 11;  // 约为行高 1/4，更纤细
function makeBar(task, rs, unit){
  const startOff = diffDays(rs, task.start)/unit;
  const span = (diffDays(task.start, task.end)+1)/unit;
  const left = startOff*COL_W;
  const width = Math.max(COL_W*0.5, span*COL_W);
  const color = featureColor(task.featureName);

  const bar=document.createElement("div");
  bar.className="bar"; bar.dataset.id=task.id;
  bar.style.left=left+"px"; bar.style.top=((ROW_H-BAR_H)/2)+"px"; bar.style.width=width+"px";
  bar.style.height=BAR_H+"px"; bar.style.background=color+"66"; bar.style.boxShadow="none";
  bar.innerHTML = `<div class="barfill" style="width:${task.progress}%;background:${color};opacity:.92;border-radius:999px"></div>
    <span class="barlabel" style="color:#4a4a4f;text-shadow:none;font-size:10px;line-height:${BAR_H}px;margin-left:6px">${esc(task.owner)} · ${task.progress}%</span>
    <div class="handle l"></div><div class="handle r"></div>`;
  bar.title = `${task.featureName}\n${deptLabel(task)}\n${task.start} → ${task.end} · ${task.progress}%\n${task.notes||""}\n（双击查看/编辑详情）`;

  bar.addEventListener("dblclick",e=>{ e.stopPropagation(); openEditor(task.id); });
  bar.addEventListener("click",e=>{ e.stopPropagation(); focusTableRow(task.id); });
  enableDrag(bar, task, unit);
  return bar;
}

function toggleCollapse(fn){
  STATE.meta.collapsed = STATE.meta.collapsed||[];
  const i=STATE.meta.collapsed.indexOf(fn);
  if(i<0) STATE.meta.collapsed.push(fn); else STATE.meta.collapsed.splice(i,1);
  save(); redrawGantt();
}

/* ============ 拖拽与缩放 ============ */
function enableDrag(bar, task, unit){
  let mode=null, startX=0, origLeft=0, origW=0, moved=false;
  const onDown=(e,m)=>{
    e.preventDefault(); e.stopPropagation();
    mode=m; startX=e.clientX; origLeft=parseFloat(bar.style.left); origW=parseFloat(bar.style.width); moved=false;
    document.addEventListener("mousemove",onMove); document.addEventListener("mouseup",onUp);
  };
  const snap = px => Math.round(px/COL_W)*COL_W;
  const onMove=e=>{
    const dx=e.clientX-startX;
    if(Math.abs(dx)>2) moved=true;
    if(mode==="move"){ bar.style.left=(origLeft+dx)+"px"; }
    else if(mode==="l"){ const nl=origLeft+dx; bar.style.left=nl+"px"; bar.style.width=Math.max(COL_W*0.5,origW-dx)+"px"; }
    else if(mode==="r"){ bar.style.width=Math.max(COL_W*0.5,origW+dx)+"px"; }
  };
  const onUp=()=>{
    document.removeEventListener("mousemove",onMove); document.removeEventListener("mouseup",onUp);
    if(!moved){ return; }  // 纯点击：不重绘，保证 dblclick 能正常触发打开详情
    // 像素 -> 日期
    const newLeft=snap(parseFloat(bar.style.left));
    const newW=snap(parseFloat(bar.style.width));
    const startUnits=Math.round(newLeft/COL_W);
    const spanUnits=Math.max(1,Math.round(newW/COL_W));
    const ns=clampDate(addDays(STATE.meta.rangeStart, startUnits*unit));
    const ne=clampDate(addDays(ns,(spanUnits*unit)-1));
    task.start=ns; task.end=ne;
    save(); renderAll();
    toast(`已更新「${task.featureName}」：${ns} → ${ne}`);
  };
  bar.addEventListener("mousedown",e=>{
    if(e.target.classList.contains("handle")) return;
    onDown(e,"move");
  });
  bar.querySelector(".handle.l").addEventListener("mousedown",e=>onDown(e,"l"));
  bar.querySelector(".handle.r").addEventListener("mousedown",e=>onDown(e,"r"));
}

/* ============ Master Table ============ */

  {k:"id",label:"需求ID",ro:true,w:"108px"},
  {k:"priority",label:"优先级",priority:true,w:"82px"},
  {k:"dept",label:"所属部门",ro:true,w:"130px"},

          <select class="statussel" data-k="priority" style="color:${pc};font-weight:700">
          ${PRIORITY_OPTIONS.map(o=>`<option ${o===t.priority?"selected":""}>${o}</option>`).join("")}
          </select></span></td>`;
      }
      if(c.k==="dept") return `<td><span class="pill" style="background:rgba(242,242,247,.95);color:#515154">${esc(deptLabel(t))}</span></td>`;

        return `<td><span class="pill" style="background:${color}1f;color:${color}">
          <i class="legend-dot" style="background:${color}"></i>
          <select class="statussel" data-k="status" style="color:${color}">

            class="cell-edit" style="width:48px;text-align:right">

function bindTableEvents(){
  const tb=document.getElementById("tableBody");
  tb.querySelectorAll("input,select,textarea,[contenteditable]").forEach(el=>{
    el.addEventListener("focus",()=>el.closest("tr")?.classList.add("editing"));
    el.addEventListener("blur",()=>el.closest("tr")?.classList.remove("editing"));
  });
  // 点击主表行：打开与「新增需求」一致的编辑弹窗
  tb.querySelectorAll("tr").forEach(row=>{
    row.addEventListener("click",e=>{
      if(e.target.closest("button,input,select,textarea,[contenteditable],.row-del")) return;
      openEditor(row.dataset.id);
    });
  });
  // 删除单条需求
  tb.querySelectorAll('.row-del').forEach(btn=>{
    btn.addEventListener("click",()=>{
      const id=btn.dataset.id, t=STATE.tasks.find(x=>x.id===id); if(!t) return;
      if(confirm(`确认删除需求「${t.featureName}」（${deptLabel(t)} · ${t.owner}）？操作不可撤销。`)){
        STATE.tasks=STATE.tasks.filter(x=>x.id!==id);
        save(); renderAll(); toast("已删除该需求");
      }
    });
  });
  // 文本编辑（contenteditable）
  tb.querySelectorAll('.cell-edit[contenteditable]').forEach(el=>{
    el.addEventListener("blur",()=>{
      const id=el.closest("tr").dataset.id, k=el.dataset.k;
      const t=STATE.tasks.find(x=>x.id===id);
      const v=el.textContent.trim();
      if(t[k]!==v){ t[k]=v; save(); redrawGantt(); }
    });
    el.addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); el.blur(); } });
  });
  // 进度数字
  tb.querySelectorAll('input[data-k="progress"]').forEach(inp=>{
    inp.addEventListener("change",()=>{
      const id=inp.closest("tr").dataset.id, t=STATE.tasks.find(x=>x.id===id);
      let v=Math.max(0,Math.min(100,parseInt(inp.value)||0));
      t.progress=v; save(); renderAll();
    });
  });
  // 日期
  tb.querySelectorAll('input.dt').forEach(inp=>{
    inp.addEventListener("change",()=>{
      const id=inp.closest("tr").dataset.id, k=inp.dataset.k, t=STATE.tasks.find(x=>x.id===id);
      t[k]=inp.value;
      if(parseD(t.end)<parseD(t.start)){ if(k==="start") t.end=t.start; else t.start=t.end; }
      autoExpandRange(t); save(); renderAll();
    });
  });
  // 状态下拉
  tb.querySelectorAll('select[data-k="status"]').forEach(sel=>{
    sel.addEventListener("change",()=>{
      const id=sel.closest("tr").dataset.id, t=STATE.tasks.find(x=>x.id===id);
      t.status=sel.value;
      if(sel.value==="已完成") t.progress=100;
      else if(sel.value==="未开始") t.progress=0;
      save(); renderAll();
    });
  });
  // 优先级下拉
  tb.querySelectorAll('select[data-k="priority"]').forEach(sel=>{
    sel.addEventListener("change",()=>{
      const id=sel.closest("tr").dataset.id, t=STATE.tasks.find(x=>x.id===id);
      t.priority=sel.value;
      save(); renderAll();
    });
  });
}
function autoExpandRange(t){
  if(parseD(t.start)<parseD(STATE.meta.rangeStart)) STATE.meta.rangeStart=t.start;
  if(parseD(t.end)>parseD(STATE.meta.rangeEnd)) STATE.meta.rangeEnd=t.end;
  syncRangeInputs();
}

/* ============ Y轴 inline 编辑 ============ */
function bindYEdit(){
  document.querySelectorAll('#ganttGrid .gantt-priority-select').forEach(sel=>{
    sel.addEventListener("click",e=>e.stopPropagation());
    sel.addEventListener("change",()=>{
      const featureName=sel.dataset.feat;
      STATE.tasks.forEach(task=>{
        if(task.featureName===featureName) task.priority=sel.value;
      });
      save(); renderAll(); toast(`已更新「${featureName}」优先级为 ${sel.value}`);
    });
  });
  document.querySelectorAll('#ganttGrid .editable').forEach(el=>{
    el.addEventListener("dblclick",e=>{
      e.stopPropagation();
      el.setAttribute("contenteditable","true"); el.focus();
      document.execCommand && document.getSelection().selectAllChildren(el);
    });
    el.addEventListener("blur",()=>{
      if(el.getAttribute("contenteditable")!=="true") return;
      el.removeAttribute("contenteditable");
      const id=el.dataset.id, field=el.dataset.edit, v=el.textContent.trim();
      const t=STATE.tasks.find(x=>x.id===id); if(!t||!v){ renderGantt(); return; }
      const old=t[field];
      if(field==="featureName"){
        // 组头改名：同名整组一起改，保持合并
        STATE.tasks.forEach(x=>{ if(x.featureName===old) x.featureName=v; });
        if(STATE.meta.featureOrder){ const oi=STATE.meta.featureOrder.indexOf(old); if(oi>=0) STATE.meta.featureOrder[oi]=v; }
        if(STATE.meta.collapsed){ const ci=STATE.meta.collapsed.indexOf(old); if(ci>=0) STATE.meta.collapsed[ci]=v; }
      } else if(field==="tier1"||field==="tier2"){
        STATE.tasks.forEach(x=>{ if(x[field]===old && (field==="tier1"? true : x.tier1===t.tier1)) x[field]=v; });
      } else { t[field]=v; }
      save(); renderAll();
    });
    el.addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); el.blur(); } });
  });
}

// 折叠/展开 & 删除组：用事件委托（lucide 会替换图标节点，直接绑定会失效）
function bindGridDelegation(){
  const grid=document.getElementById("ganttGrid");
  if(grid._delegated) return; grid._delegated=true;
  grid.addEventListener("click",e=>{
    const priorityHead=e.target.closest(".priority-sort-head");
    if(priorityHead){
      e.stopPropagation();
      STATE.meta.prioritySort = STATE.meta.prioritySort==="asc" ? "desc" : "asc";
      save(); renderAll(); toast(`已按优先级${STATE.meta.prioritySort==="asc"?"升序":"降序"}排序`);
      return;
    }
    const caret=e.target.closest(".group-caret");
    if(caret){ e.stopPropagation(); toggleCollapse(caret.dataset.feat); return; }
    const add=e.target.closest(".group-add");
    if(add){
      e.stopPropagation();
      openEditor(null, draftFromGroup(add.dataset.feat));
      return;
    }
    const del=e.target.closest(".group-del");
    if(del){
      e.stopPropagation();
      const fn=del.dataset.feat;
      const n=STATE.tasks.filter(t=>t.featureName===fn).length;
      if(confirm(`确认删除需求「${fn}」？将移除该组下全部 ${n} 个部门任务，操作不可撤销。`)){
        STATE.tasks=STATE.tasks.filter(t=>t.featureName!==fn);
        if(STATE.meta.collapsed){ const ci=STATE.meta.collapsed.indexOf(fn); if(ci>=0) STATE.meta.collapsed.splice(ci,1); }
        save(); renderAll(); toast(`已删除需求组「${fn}」`);
      }
    }
  });
  grid.addEventListener("dragstart",e=>{
    const head=e.target.closest(".group-head");
    if(!head || e.target.closest(".group-caret,.group-add,.group-del,.gantt-priority-select,.editable,[contenteditable]")){
      e.preventDefault(); return;
    }
    grid.dataset.dragFeat=head.dataset.feat;
    head.classList.add("dragging");
    e.dataTransfer.effectAllowed="move";
    e.dataTransfer.setData("text/plain",head.dataset.feat);
  });
  grid.addEventListener("dragover",e=>{
    const head=e.target.closest(".group-head");
    if(!head || !grid.dataset.dragFeat || head.dataset.feat===grid.dataset.dragFeat) return;
    e.preventDefault();
    document.querySelectorAll("#ganttGrid .group-head.drag-over").forEach(el=>el.classList.remove("drag-over"));
    head.classList.add("drag-over");
  });
  grid.addEventListener("dragleave",e=>{
    const head=e.target.closest(".group-head");
    if(head) head.classList.remove("drag-over");
  });
  grid.addEventListener("drop",e=>{
    const target=e.target.closest(".group-head");
    const sourceFeat=grid.dataset.dragFeat;
    if(!target || !sourceFeat || target.dataset.feat===sourceFeat) return;
    e.preventDefault();
    moveFeatureBefore(sourceFeat,target.dataset.feat);
    delete grid.dataset.dragFeat;
    document.querySelectorAll("#ganttGrid .group-head.dragging,.group-head.drag-over").forEach(el=>el.classList.remove("dragging","drag-over"));
    STATE.meta.prioritySort=null;
    save(); renderAll(); toast("已调整需求显示位置");
  });
  grid.addEventListener("dragend",()=>{
    delete grid.dataset.dragFeat;
    document.querySelectorAll("#ganttGrid .group-head.dragging,.group-head.drag-over").forEach(el=>el.classList.remove("dragging","drag-over"));
  });
}

/* ============ 详情编辑器（双击甘特条 / 新增）============ */
// isNew=true 时 t 是草稿，仅在点击「确认保存」后才并入 STATE
function openEditor(id, draft){
  const isNew = !!draft;
  const t = isNew ? draft : STATE.tasks.find(x=>x.id===id);
  if(!t) return;
  const f=(label,html)=>`<label class="block text-[11px] font-semibold mb-1" style="color:var(--muted)">${label}</label>${html}`;
  const inp=(k,val,type="text")=>`<input data-f="${k}" type="${type}" value="${esc(val)}" class="w-full btn !cursor-text mb-3" style="display:block">`;
  const t2Field=(t1,sel)=>t1==="其他"
    ? `<input data-f="tier2" id="selT2" type="text" value="${esc(sel&&sel!=="全局"?sel:"")}" placeholder="填写外部合作部门 / 团队" class="w-full btn !cursor-text mb-3" style="display:block">`
    : `<select data-f="tier2" id="selT2" class="w-full btn mb-3" style="display:block">${(TIER2_MAP[t1]||["全局"]).map(o=>`<option ${o===sel?"selected":""}>${o}</option>`).join("")}</select>`;
  const wrap=document.createElement("div");
  wrap.style.cssText="position:fixed;inset:0;background:rgba(43,45,42,.24);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(18px)";
  wrap.innerHTML=`<div style="background:rgba(255,255,255,.92);border:1px solid var(--hairline);border-radius:18px;width:460px;max-width:92vw;padding:24px;box-shadow:0 24px 70px rgba(0,0,0,.18)" onclick="event.stopPropagation()">
    <div class="flex items-center justify-between mb-4">
      <h3 class="font-bold text-[15px] m-0">${isNew?"新增需求":"编辑需求 · "+esc(t.id)}</h3>
      <button class="btn !p-1.5" id="mClose"><i data-lucide="x" class="icon"></i></button>
    </div>
    ${f("需求名称",inp("featureName",t.featureName))}
    ${f("核心业务目的",inp("purpose",t.purpose))}
    <div class="grid grid-cols-2 gap-3">
      <div>${f("优先级",`<select data-f="priority" class="w-full btn mb-3" style="display:block">${PRIORITY_OPTIONS.map(o=>`<option ${o===t.priority?"selected":""}>${o}</option>`).join("")}</select>`)}</div>
      <div>${f("负责人",inp("owner",t.owner))}</div>
    </div>
    <div class="grid grid-cols-2 gap-3">
      <div>${f("部门",`<select data-f="tier1" id="selT1" class="w-full btn mb-3" style="display:block">${TIER_ORDER.map(o=>`<option ${o===t.tier1?"selected":""}>${o}</option>`).join("")}</select>`)}</div>
      <div id="tier2Wrap">${f("端 / 职能",t2Field(t.tier1,t.tier2))}</div>
    </div>
    <div class="grid grid-cols-2 gap-3">
      <div>${f("开始",inp("start",t.start,"date"))}</div>
      <div>${f("结束",inp("end",t.end,"date"))}</div>
    </div>
    <div class="grid grid-cols-2 gap-3">
      <div>${f("进度 %",inp("progress",t.progress,"number"))}</div>
      <div>${f("状态",`<select data-f="status" class="w-full btn mb-3" style="display:block">${STATUS_OPTIONS.map(o=>`<option ${o===t.status?"selected":""}>${o}</option>`).join("")}</select>`)}</div>
    </div>
    ${f("备注",`<textarea data-f="notes" rows="2" class="w-full btn !cursor-text mb-4" style="display:block;resize:vertical">${esc(t.notes||"")}</textarea>`)}
    <div class="flex justify-between">
      ${isNew?'<span></span>':'<button class="btn" id="mDel" style="color:var(--red)"><i data-lucide="trash-2" class="icon"></i>删除</button>'}
      <button class="btn btn-primary" id="mSave"><i data-lucide="check" class="icon"></i>${isNew?"确认保存":"保存"}</button>
    </div></div>`;
  wrap.addEventListener("click",()=>document.body.removeChild(wrap));
  document.body.appendChild(wrap); refreshIcons();
  // Tier1 改变联动 Tier2 选项
  wrap.querySelector("#selT1").onchange=e=>{
    wrap.querySelector("#tier2Wrap").innerHTML=f("端 / 职能",t2Field(e.target.value,e.target.value==="其他" ? "" : "全局"));
  };
  wrap.querySelector("#mClose").onclick=()=>document.body.removeChild(wrap);
  wrap.querySelector("#mSave").onclick=()=>{
    wrap.querySelectorAll("[data-f]").forEach(el=>{
      const k=el.dataset.f; let v=el.value;
      if(k==="progress") v=Math.max(0,Math.min(100,parseInt(v)||0));
      if(k==="tier2") v=v.trim();
      t[k]=v;
    });
    if(t.tier1==="其他" && !t.tier2) t.tier2="外部协作";
    if(parseD(t.end)<parseD(t.start)) t.end=t.start;
    if(isNew) STATE.tasks.push(t);   // 仅此刻才真正新增
    autoExpandRange(t); document.body.removeChild(wrap); save(); renderAll();
    toast(isNew?"已新增需求":"已保存修改");
  };
  const delBtn=wrap.querySelector("#mDel");
  if(delBtn) delBtn.onclick=()=>{
    if(confirm(`确认删除需求「${t.featureName}」？此操作不可撤销。`)){
      STATE.tasks=STATE.tasks.filter(x=>x.id!==t.id);
      document.body.removeChild(wrap); save(); renderAll(); toast("已删除");
    }
  };
}

function openFilterPanel(){
  const filters=STATE.meta.filters||{priority:"全部",status:"全部",dept:"全部"};
  const opt=(items,selected)=>items.map(o=>`<option ${o===selected?"selected":""}>${o}</option>`).join("");
  const f=(label,html)=>`<label class="block text-[11px] font-semibold mb-1" style="color:var(--muted)">${label}</label>${html}`;
  const wrap=document.createElement("div");
  wrap.style.cssText="position:fixed;inset:0;background:rgba(43,45,42,.24);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(18px)";
  wrap.innerHTML=`<div style="background:rgba(255,255,255,.92);border:1px solid var(--hairline);border-radius:18px;width:360px;max-width:92vw;padding:24px;box-shadow:0 24px 70px rgba(0,0,0,.18)" onclick="event.stopPropagation()">
    <div class="flex items-center justify-between mb-4">
      <h3 class="font-bold text-[15px] m-0">筛选</h3>
      <button class="btn !p-1.5" id="fClose"><i data-lucide="x" class="icon"></i></button>
    </div>
    ${f("优先级",`<select data-filter="priority" class="w-full btn mb-3" style="display:block">${opt(["全部",...PRIORITY_OPTIONS],filters.priority)}</select>`)}
    ${f("当前状态",`<select data-filter="status" class="w-full btn mb-3" style="display:block">${opt(["全部",...STATUS_OPTIONS],filters.status)}</select>`)}
    ${f("部门",`<select data-filter="dept" class="w-full btn mb-4" style="display:block">${opt(["全部",...TIER_ORDER],filters.dept)}</select>`)}
    <div class="flex justify-between">
      <button class="btn" id="fReset"><i data-lucide="rotate-ccw" class="icon"></i>清空筛选</button>
      <button class="btn btn-primary" id="fApply"><i data-lucide="check" class="icon"></i>应用</button>
    </div></div>`;
  wrap.addEventListener("click",()=>document.body.removeChild(wrap));
  document.body.appendChild(wrap); refreshIcons();
  wrap.querySelector("#fClose").onclick=()=>document.body.removeChild(wrap);
  wrap.querySelector("#fReset").onclick=()=>{
    STATE.meta.filters={priority:"全部",status:"全部",dept:"全部"};
    document.body.removeChild(wrap); save(); renderAll(); toast("已清空筛选");
  };
  wrap.querySelector("#fApply").onclick=()=>{
    wrap.querySelectorAll("[data-filter]").forEach(el=>{ STATE.meta.filters[el.dataset.filter]=el.value; });
    document.body.removeChild(wrap); save(); renderAll(); toast("已应用筛选");
  };
}

/* ============ 工具栏 ============ */
function toast(msg){ const el=document.getElementById("toast"); el.textContent=msg; el.classList.add("show"); clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove("show"),2200); }
function refreshIcons(){ if(window.lucide) lucide.createIcons(); }
function syncRangeInputs(){ document.getElementById("rangeStart").value=STATE.meta.rangeStart; document.getElementById("rangeEnd").value=STATE.meta.rangeEnd; }
function updateHolidayHint(){
  const el=document.getElementById("holidayHint");
  if(!el) return;
  const today=todayStr();
  const upcoming=HOLIDAYS.map(h=>({...h,days:diffDays(today,h.date)}))
    .filter(h=>h.days>=0&&h.days<=14)
    .sort((a,b)=>a.days-b.days);
  if(!upcoming.length){
    el.innerHTML=`<i data-lucide="calendar-days" class="icon"></i>14天内暂无重要节日`;
    el.title="按今天起未来 14 天计算";
    return;
  }
  const text=upcoming.map(h=>`${h.name}${h.days===0?"今天":`${h.days}天后`}`).join(" · ");
  el.innerHTML=`<i data-lucide="calendar-heart" class="icon"></i>${text}`;
  el.title=upcoming.map(h=>`${h.date} · ${h.name} · ${h.type}`).join("\n");
}
function applyGanttHeight(){
  const el=document.getElementById("ganttScroll");
  if(el) el.style.maxHeight=(STATE.meta.ganttHeight||420)+"px";
}
function nextId(){ return nextIdFromList(STATE.tasks); }
function nextIdFromList(list){ let max=0; list.forEach(t=>{ const m=/(\d+)$/.exec(t.id||""); if(m) max=Math.max(max,+m[1]); }); return "REQ-2026-"+String(max+1).padStart(3,"0"); }

function bindGanttResizer(){
  const handle=document.getElementById("ganttResizer");
  const scroll=document.getElementById("ganttScroll");
  if(!handle||!scroll||handle._bound) return;
  handle._bound=true;
  handle.addEventListener("mousedown",e=>{
    e.preventDefault();
    const startY=e.clientY;
    const startH=scroll.getBoundingClientRect().height || STATE.meta.ganttHeight || 420;
    const onMove=evt=>{
      const maxH=Math.max(260,Math.floor(window.innerHeight-180));
      STATE.meta.ganttHeight=Math.max(220,Math.min(maxH,Math.round(startH+evt.clientY-startY)));
      applyGanttHeight();
    };
    const onUp=()=>{
      document.removeEventListener("mousemove",onMove);
      document.removeEventListener("mouseup",onUp);
      save();
      toast(`甘特图高度已调整为 ${STATE.meta.ganttHeight}px`);
    };
    document.addEventListener("mousemove",onMove);
    document.addEventListener("mouseup",onUp);
  });
}

function bindToolbar(){
  // 粒度
  document.querySelectorAll("#granSeg button").forEach(b=>b.onclick=()=>{
    document.querySelectorAll("#granSeg button").forEach(x=>x.classList.remove("active"));
    b.classList.add("active"); STATE.meta.gran=b.dataset.gran; save(); redrawGantt();
  });
  // 时间范围
  document.getElementById("rangeStart").onchange=e=>{ STATE.meta.rangeStart=e.target.value; save(); redrawGantt(); };
  document.getElementById("rangeEnd").onchange=e=>{ STATE.meta.rangeEnd=e.target.value; save(); redrawGantt(); };
  document.getElementById("filterBtn").onclick=openFilterPanel;
  // 自适应：包裹所有任务时间
  document.getElementById("fitBtn").onclick=()=>{
    let mn=STATE.tasks[0]?.start, mx=STATE.tasks[0]?.end;
    STATE.tasks.forEach(t=>{ if(parseD(t.start)<parseD(mn))mn=t.start; if(parseD(t.end)>parseD(mx))mx=t.end; });
    if(mn&&mx){ STATE.meta.rangeStart=addDays(mn,-1); STATE.meta.rangeEnd=addDays(mx,1); delete STATE.meta.columnWidth; syncRangeInputs(); save(); redrawGantt(); }
  };
  // 新增（草稿，确认保存后才入库）
  document.getElementById("addBtn").onclick=()=>{
    const draft={id:nextId(),priority:"P1",tier1:"客户端",tier2:"iOS",featureName:"新需求",purpose:"",status:"未开始",progress:0,owner:"待分配",start:todayStr(),end:addDays(todayStr(),3),notes:""};
    openEditor(null, draft);
  };
  // 恢复模板
  document.getElementById("resetBtn").onclick=()=>{
    if(confirm("确认恢复到默认模板？当前浏览器内已保存的数据会被覆盖。")){
      resetToSeed();
      toast("已恢复默认模板");
    }
  };
  // 导出
  document.getElementById("exportBtn").onclick=()=>{
    const blob=new Blob([JSON.stringify(STATE,null,2)],{type:"application/json"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="project_data.json"; a.click();
    URL.revokeObjectURL(a.href); toast("已导出 project_data.json");
  };
  // 导入
  document.getElementById("importBtn").onclick=()=>document.getElementById("importFile").click();
  document.getElementById("importFile").onchange=e=>{
    const file=e.target.files[0]; if(!file) return;
    const r=new FileReader();
    r.onload=()=>{ try{
      const d=JSON.parse(r.result);
      if(!d.tasks||!Array.isArray(d.tasks)) throw 0;
      const importedTasks=d.tasks.map(normalizeTask);
      const first=importedTasks[0]||SEED.tasks[0];
      STATE=normalizeState({
        meta:{
          gran:d.meta?.gran==="week"?"week":"day",
          rangeStart:d.meta?.rangeStart||first.start,
          rangeEnd:d.meta?.rangeEnd||first.end,
          columnWidth:d.meta?.columnWidth,
          ganttHeight:d.meta?.ganttHeight,
          featureOrder:Array.isArray(d.meta?.featureOrder)?d.meta.featureOrder:[],
          prioritySort:d.meta?.prioritySort||null,
          filters:d.meta?.filters||{priority:"全部",status:"全部",dept:"全部"},
          collapsed:[]
        },
        tasks:importedTasks
      });
      save(); renderAll(); syncRangeInputs(); toast("导入成功，已全量覆盖");
    }catch(err){ toast("导入失败：JSON 格式不正确"); } };
    r.readAsText(file); e.target.value="";
  };
}

/* ============ 渲染入口 ============ */
function renderAll(){ applyGanttHeight(); updateHolidayHint(); renderGantt(); bindYEdit(); renderTable(); refreshIcons(); }
function redrawGantt(){ applyGanttHeight(); updateHolidayHint(); renderGantt(); bindYEdit(); refreshIcons(); }
syncRangeInputs(); bindToolbar(); bindGridDelegation(); bindGanttResizer(); renderAll(); refreshIcons();
window.addEventListener("resize",()=>{ redrawGantt(); });
</script>
